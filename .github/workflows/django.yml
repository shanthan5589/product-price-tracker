name: Django CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('price_tracker/requirements.txt') }}-torch-cpu

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r price_tracker/requirements.txt

      - name: Run tests
        working-directory: price_tracker
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: python manage.py test tracker --verbosity=2
