databases:
  - name: price-tracker-db
    databaseName: price_tracker
    user: price_tracker

services:
  - type: web
    name: product-price-tracker
    runtime: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: price-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
    healthCheckPath: /healthz/
